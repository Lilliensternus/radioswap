<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>RadioSwap – NRK × Spotify</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0a0a0f; --surface:#13131a; --surface2:#1c1c26; --nrk:#ff4b4b; --spotify:#1db954; --text:#f0f0f8; --muted:#6b6b80; --border:#2a2a38; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; min-height:100vh; display:flex; flex-direction:column; }
  .bg-orb { position:fixed; border-radius:50%; filter:blur(80px); opacity:0.12; pointer-events:none; z-index:0; transition:all 2s; }
  .bg-orb.nrk { width:400px; height:400px; background:var(--nrk); top:-100px; left:-100px; }
  .bg-orb.spotify { width:350px; height:350px; background:var(--spotify); bottom:-80px; right:-80px; }
  .bg-orb.active { opacity:0.22; }
  .app { position:relative; z-index:1; flex:1; display:flex; flex-direction:column; padding:0 20px 40px; max-width:420px; margin:0 auto; width:100%; }
  header { padding:52px 0 28px; text-align:center; }
  .logo { font-size:11px; font-family:'DM Mono',monospace; letter-spacing:0.3em; color:var(--muted); text-transform:uppercase; margin-bottom:8px; }
  h1 { font-size:38px; font-weight:800; letter-spacing:-1px; }
  .nrk-c{color:var(--nrk)} .sp-c{color:var(--spotify)} .x-c{color:var(--muted);margin:0 4px}
  .card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:20px 24px; margin:12px 0; }
  .card.playing-nrk { border-color:rgba(255,75,75,0.5); box-shadow:0 0 30px rgba(255,75,75,0.3); }
  .card.playing-spotify { border-color:rgba(29,185,84,0.5); box-shadow:0 0 30px rgba(29,185,84,0.3); }
  .status-row { display:flex; align-items:center; gap:16px; }
  .s-icon { width:52px; height:52px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:26px; flex-shrink:0; background:var(--surface2); }
  .s-icon.nrk-bg{background:rgba(255,75,75,0.15)} .s-icon.sp-bg{background:rgba(29,185,84,0.15)}
  .s-info{flex:1;min-width:0}
  .s-label{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:4px}
  .s-title{font-size:18px;font-weight:700} .s-sub{font-size:13px;color:var(--muted);margin-top:2px}
  .waveform{display:flex;align-items:center;gap:3px;height:28px}
  .wb{width:3px;border-radius:2px;background:var(--muted);animation:wave 1.2s ease-in-out infinite}
  .wb:nth-child(1){height:8px;animation-delay:0s}.wb:nth-child(2){height:16px;animation-delay:0.15s}
  .wb:nth-child(3){height:24px;animation-delay:0.3s}.wb:nth-child(4){height:18px;animation-delay:0.45s}.wb:nth-child(5){height:12px;animation-delay:0.6s}
  .wb.nrk-bar{background:var(--nrk)} .wb.sp-bar{background:var(--spotify)}
  .waveform.paused .wb{animation:none;height:4px;background:var(--border)}
  @keyframes wave{0%,100%{transform:scaleY(0.4)}50%{transform:scaleY(1)}}
  .sec-title{font-size:12px;font-family:'DM Mono',monospace;letter-spacing:0.25em;color:var(--muted);text-transform:uppercase;margin-bottom:14px}
  .inp-label{font-size:13px;color:var(--muted);margin-bottom:6px;display:block;font-family:'DM Mono',monospace}
  input[type=text]{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;outline:none;margin-bottom:12px}
  .green-btn{width:100%;padding:14px 20px;background:linear-gradient(135deg,#1db954,#17a047);border:none;border-radius:12px;color:white;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
  .green-btn.connected{background:var(--surface2);border:1px solid rgba(29,185,84,0.5);color:var(--spotify)}
  .big-btn{width:100%;padding:20px;border-radius:18px;border:none;cursor:pointer;font-family:'Syne',sans-serif;font-size:17px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:10px;margin:8px 0}
  .start-btn{background:linear-gradient(135deg,#ff4b4b,#ff6b35);color:white;box-shadow:0 8px 32px rgba(255,75,75,0.35)}
  .stop-btn{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
  .meter-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
  .m-label{font-size:12px;font-family:'DM Mono',monospace;color:var(--muted);width:50px;flex-shrink:0}
  .m-track{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
  .m-fill{height:100%;border-radius:3px;transition:width 0.3s;width:0%}
  .m-fill.speech{background:linear-gradient(90deg,#ff4b4b,#ff8a65)}
  .m-fill.music{background:linear-gradient(90deg,#1db954,#80e27e)}
  .m-val{font-size:12px;font-family:'DM Mono',monospace;color:var(--muted);width:36px;text-align:right}
  .buf-row{display:flex;justify-content:space-between;margin-bottom:6px}
  .buf-lbl{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted)}
  .buf-track{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-bottom:14px}
  .buf-fill{height:100%;background:linear-gradient(90deg,var(--nrk),#ff8a65);border-radius:2px;transition:width 0.5s;width:0%}
  .track-row{display:flex;align-items:center;gap:12px;padding:14px 0 0;border-top:1px solid var(--border);margin-top:14px}
  .track-thumb{width:44px;height:44px;border-radius:8px;background:var(--surface2);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px}
  .track-thumb img{width:100%;height:100%;object-fit:cover}
  .log-wrap{max-height:140px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;scrollbar-width:none}
  .log-entry{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);padding:6px 10px;background:var(--surface2);border-radius:8px;display:flex;gap:8px}
  .log-entry.nrk{border-left:2px solid var(--nrk);color:rgba(255,75,75,0.8)}
  .log-entry.spotify{border-left:2px solid var(--spotify);color:rgba(29,185,84,0.8)}
  .log-t{opacity:0.5;flex-shrink:0}
  .notice{font-size:12px;font-family:'DM Mono',monospace;color:var(--muted);text-align:center;padding:8px 0 0}
  .hidden{display:none !important}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--nrk);display:inline-block;margin-right:6px;animation:pulse 1.5s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
</style>
</head>
<body>
<div class="bg-orb nrk" id="orbNrk"></div>
<div class="bg-orb spotify" id="orbSpotify"></div>
<div class="app">
  <header>
    <div class="logo">RadioSwap Beta</div>
    <h1><span class="nrk-c">NRK</span><span class="x-c">×</span><span class="sp-c">Spotify</span></h1>
  </header>
  <div class="card" id="statusCard">
    <div class="status-row">
      <div class="s-icon" id="sIcon">📻</div>
      <div class="s-info">
        <div class="s-label" id="sLabel">Klar</div>
        <div class="s-title" id="sTitle">NRK P1</div>
        <div class="s-sub" id="sSub">Trykk for å starte</div>
      </div>
      <div class="waveform paused" id="waveform">
        <div class="wb"></div><div class="wb"></div><div class="wb"></div><div class="wb"></div><div class="wb"></div>
      </div>
    </div>
  </div>
  <div class="card hidden" id="nowPlayingCard">
    <div class="sec-title">🎵 Spilles nå</div>
    <div class="track-row">
      <div class="track-thumb" id="trackThumb">🎵</div>
      <div>
        <div style="font-size:15px;font-weight:700" id="trackName">–</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px" id="trackArtist">–</div>
      </div>
    </div>
  </div>
  <div class="card hidden" id="analysisCard">
    <div class="sec-title">🔍 Lydanalyse</div>
    <div class="buf-row"><span class="buf-lbl">BUFFER</span><span class="buf-lbl" id="bufSec">0 / 15 sek</span></div>
    <div class="buf-track"><div class="buf-fill" id="bufFill"></div></div>
    <div class="meter-row"><span class="m-label">TALE</span><div class="m-track"><div class="m-fill speech" id="speechM"></div></div><span class="m-val" id="speechV">0%</span></div>
    <div class="meter-row"><span class="m-label">MUSIKK</span><div class="m-track"><div class="m-fill music" id="musicM"></div></div><span class="m-val" id="musicV">0%</span></div>
  </div>
  <div class="card" id="spotifyCard">
    <div class="sec-title">🔗 Koble til Spotify</div>
    <label class="inp-label">CLIENT ID</label>
    <input type="text" id="clientId" autocomplete="off" autocorrect="off" autocapitalize="off">
    <label class="inp-label">SPILLELISTE URL</label>
    <input type="text" id="playlistUrl" autocorrect="off" autocapitalize="off">
    <button class="green-btn" id="authBtn" onclick="connectSpotify()">🎵 Koble til Spotify</button>
  </div>
  <button class="big-btn start-btn" id="startBtn" onclick="startRadio()">📻 Start RadioSwap</button>
  <button class="big-btn stop-btn hidden" id="stopBtn" onclick="stopRadio()">⏹ Stopp</button>
  <div class="card hidden" id="logCard">
    <div class="sec-title"><span class="dot"></span>LOGG</div>
    <div class="log-wrap" id="logWrap"></div>
  </div>
  <p class="notice">NRK P1 · ~15 sek forsinkelse · Automatisk musikkbytte</p>
</div>
<script>
const NRK='https://lyd.nrk.no/nrk_p1_ostlandssendingen_mp3_aac';
const SCOPES='user-read-playback-state user-modify-playback-state user-read-currently-playing playlist-read-private';
const DEFAULT_CID='4c27a1d811b145969fa544506dc23580';
const DEFAULT_PL='https://open.spotify.com/playlist/7FCu9ei8bjirfCY9efwwXs';
const REDIRECT='https://lilliensternus.github.io/radioswap/';
const BUF=15,THRESH=4;
let tok=null,pid=null,tracks=[],running=false,mode='nrk';
let actx=null,analyser=null,audio=null,aInt=null,bInt=null,bSec=0,cM=0,cS=0;

async function generateVerifier(){
  const a=new Uint8Array(64);crypto.getRandomValues(a);
  return btoa(String.fromCharCode(...a)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
async function generateChallenge(v){
  const e=new TextEncoder().encode(v);
  const d=await crypto.subtle.digest('SHA-256',e);
  return btoa(String.fromCharCode(...new Uint8Array(d))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

async function connectSpotify(){
  const cid=document.getElementById('clientId').value.trim();
  const pl=document.getElementById('playlistUrl').value.trim();
  if(!cid||!pl){alert('Fyll inn begge feltene');return;}
  const m=pl.match(/playlist\/([a-zA-Z0-9]+)/);
  if(!m){alert('Ugyldig spilleliste-URL');return;}
  localStorage.setItem('cid',cid);localStorage.setItem('pid',m[1]);localStorage.setItem('purl',pl);
  const verifier=await generateVerifier();
  const challenge=await generateChallenge(verifier);
  localStorage.setItem('verifier',verifier);
  const p=new URLSearchParams({client_id:cid,response_type:'code',redirect_uri:REDIRECT,scope:SCOPES,code_challenge_method:'S256',code_challenge:challenge});
  window.location.href='https://accounts.spotify.com/authorize?'+p;
}

async function handleCallback(){
  const p=new URLSearchParams(window.location.search);
  const code=p.get('code');
  if(!code)return;
  const cid=localStorage.getItem('cid');
  const verifier=localStorage.getItem('verifier');
  if(!cid||!verifier)return;
  try{
    const r=await fetch('https://accounts.spotify.com/api/token',{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:new URLSearchParams({grant_type:'authorization_code',code,redirect_uri:REDIRECT,client_id:cid,code_verifier:verifier})
    });
    const d=await r.json();
    if(d.access_token){
      tok=d.access_token;
      localStorage.setItem('tok',tok);
      localStorage.setItem('exp',Date.now()+d.expires_in*1000);
      localStorage.setItem('refresh',d.refresh_token||'');
      pid=localStorage.getItem('pid');
      window.history.replaceState({},'',window.location.pathname);
      setConnected();log('Spotify koblet til ✓','spotify');
    }
  }catch(e){log('Innloggingsfeil: '+e.message,'nrk');}
}

function loadSaved(){
  const t=localStorage.getItem('tok'),e=localStorage.getItem('exp');
  if(t&&e&&Date.now()<parseInt(e)){tok=t;pid=localStorage.getItem('pid');setConnected();return true;}
  return false;
}

function setConnected(){
  const b=document.getElementById('authBtn');
  b.className='green-btn connected';b.textContent='✓ Spotify tilkoblet';
}

async function loadTracks(){
  if(!tok||!pid)return;
  try{
    const r=await fetch('https://api.spotify.com/v1/playlists/'+pid+'/tracks?limit=50',{headers:{Authorization:'Bearer '+tok}});
    const d=await r.json();
    if(d.items){tracks=d.items.map(i=>i.track).filter(Boolean);log(tracks.length+' sanger lastet','spotify');}
  }catch(e){}
}

async function playRandom(){
  if(!tok||!tracks.length)return;
  const tr=tracks[Math.floor(Math.random()*tracks.length)];
  try{
    const dr=await fetch('https://api.spotify.com/v1/me/player/devices',{headers:{Authorization:'Bearer '+tok}});
    const dd=await dr.json();
    const dev=dd.devices?.find(d=>d.is_active)||dd.devices?.[0];
    await fetch('https://api.spotify.com/v1/me/player/play'+(dev?'?device_id='+dev.id:''),{
      method:'PUT',headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json'},
      body:JSON.stringify({uris:[tr.uri]})
    });
    document.getElementById('trackName').textContent=tr.name;
    document.getElementById('trackArtist').textContent=tr.artists?.map(a=>a.name).join(', ')||'–';
    const img=tr.album?.images?.[0]?.url;
    document.getElementById('trackThumb').innerHTML=img?'<img src="'+img+'">':'🎵';
    log('🎵 '+tr.name,'spotify');
  }catch(e){log('Spotify-feil – er appen åpen?','spotify');}
}

async function pauseSpotify(){
  if(!tok)return;
  try{await fetch('https://api.spotify.com/v1/me/player/pause',{method:'PUT',headers:{Authorization:'Bearer '+tok}});}catch(e){}
}

function setupAudio(el){
  try{
    actx=new(window.AudioContext||window.webkitAudioContext)();
    const src=actx.createMediaElementSource(el);
    analyser=actx.createAnalyser();analyser.fftSize=2048;
    src.connect(analyser);analyser.connect(actx.destination);
  }catch(e){}
}

function analyze(){
  if(!analyser)return{s:50,m:50};
  const d=new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(d);
  const bHz=(actx.sampleRate/2)/d.length;
  let tot=0,sp=0,ba=0,tr=0;
  d.forEach((v,i)=>{const f=i*bHz;tot+=v;if(f>=300&&f<=3000)sp+=v;if(f>=60&&f<300)ba+=v;if(f>5000)tr+=v;});
  if(tot<100)return{s:0,m:0};
  const sm=Math.min(100,(sp/(tot*0.4))*80),mm=Math.min(100,((ba+tr)/(tot*0.3))*80);
  const music=Math.max(0,Math.min(100,50+(mm-sm*0.5)*1.2));
  return{s:Math.max(0,Math.min(100,100-music)),m:music};
}

async function startRadio(){
  if(!tok){alert('Koble til Spotify først!');return;}
  running=true;
  document.getElementById('startBtn').classList.add('hidden');
  document.getElementById('stopBtn').classList.remove('hidden');
  document.getElementById('analysisCard').classList.remove('hidden');
  document.getElementById('logCard').classList.remove('hidden');
  await loadTracks();
  audio=new Audio();audio.crossOrigin='anonymous';audio.src=NRK;
  setupAudio(audio);audio.play().catch(()=>{});
  log('Buffrer NRK P1…','nrk');setStatus('nrk','Buffrer…','Venter 15 sek…');
  bSec=0;
  bInt=setInterval(()=>{
    bSec++;
    document.getElementById('bufFill').style.width=(bSec/BUF*100)+'%';
    document.getElementById('bufSec').textContent=bSec+' / '+BUF+' sek';
    if(bSec>=BUF){clearInterval(bInt);startListen();}
  },1000);
}

function startListen(){
  log('▶ NRK P1 live!','nrk');setStatus('nrk','NRK P1','Spiller live');setMode('nrk');
  aInt=setInterval(async()=>{
    if(!running)return;
    const{s,m}=analyze();
    document.getElementById('speechM').style.width=s+'%';document.getElementById('musicM').style.width=m+'%';
    document.getElementById('speechV').textContent=Math.round(s)+'%';document.getElementById('musicV').textContent=Math.round(m)+'%';
    if(m>65){cM++;cS=0;}else if(s>55){cS++;cM=0;}else{cM=Math.max(0,cM-1);cS=Math.max(0,cS-1);}
    if(cM>=THRESH&&mode==='nrk'){cM=0;await toSpotify();}
    else if(cS>=THRESH&&mode==='spotify'){cS=0;await toNRK();}
  },800);
}

async function toSpotify(){
  mode='spotify';log('Musikk → Spotify','spotify');setStatus('spotify','Spotify','Din musikk');setMode('spotify');
  audio.muted=true;document.getElementById('nowPlayingCard').classList.remove('hidden');await playRandom();
}

async function toNRK(){
  mode='nrk';log('Tale → NRK P1','nrk');setStatus('nrk','NRK P1','Spiller live');setMode('nrk');
  audio.muted=false;await pauseSpotify();
}

function stopRadio(){
  running=false;clearInterval(aInt);clearInterval(bInt);
  if(audio){audio.pause();audio.src='';}if(actx){actx.close();actx=null;}
  pauseSpotify();mode='nrk';cM=0;cS=0;
  document.getElementById('startBtn').classList.remove('hidden');
  document.getElementById('stopBtn').classList.add('hidden');
  document.getElementById('analysisCard').classList.add('hidden');
  document.getElementById('logCard').classList.add('hidden');
  document.getElementById('nowPlayingCard').classList.add('hidden');
  document.getElementById('bufFill').style.width='0%';
  setStatus('idle','NRK P1','Trykk for å starte');setMode('idle');log('Stoppet','nrk');
}

function setMode(m){
  const card=document.getElementById('statusCard'),icon=document.getElementById('sIcon');
  const wf=document.getElementById('waveform'),bars=wf.querySelectorAll('.wb');
  card.className='card';wf.className='waveform';bars.forEach(b=>b.className='wb');
  document.getElementById('orbNrk').className='bg-orb nrk';
  document.getElementById('orbSpotify').className='bg-orb spotify';
  if(m==='nrk'){card.classList.add('playing-nrk');icon.textContent='📻';icon.className='s-icon nrk-bg';bars.forEach(b=>b.classList.add('nrk-bar'));document.getElementById('orbNrk').classList.add('active');}
  else if(m==='spotify'){card.classList.add('playing-spotify');icon.textContent='🎵';icon.className='s-icon sp-bg';bars.forEach(b=>b.classList.add('sp-bar'));document.getElementById('orbSpotify').classList.add('active');}
  else{wf.classList.add('paused');icon.textContent='📻';icon.className='s-icon';}
}

function setStatus(m,title,sub){
  document.getElementById('sLabel').textContent=m==='nrk'?'NRK P1 LIVE':m==='spotify'?'SPOTIFY':'KLAR';
  document.getElementById('sTitle').textContent=title;
  document.getElementById('sSub').textContent=sub;
}

function log(msg,type){
  const el=document.getElementById('logWrap');
  const div=document.createElement('div');div.className='log-entry '+type;
  div.innerHTML='<span class="log-t">'+new Date().toTimeString().slice(0,5)+'</span><span>'+msg+'</span>';
  el.insertBefore(div,el.firstChild);
  while(el.children.length>20)el.removeChild(el.lastChild);
}

window.addEventListener('load',()=>{
  document.getElementById('clientId').value=localStorage.getItem('cid')||DEFAULT_CID;
  document.getElementById('playlistUrl').value=localStorage.getItem('purl')||DEFAULT_PL;
  loadSaved();
  handleCallback();
});
</script>
</body>
</html>
